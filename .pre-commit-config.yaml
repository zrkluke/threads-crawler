repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: .venv/Scripts/python.exe -m ruff check
        language: system
        types: [python]
      - id: ruff-format-check
        name: ruff format check
        entry: .venv/Scripts/python.exe -m ruff format --check
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: .venv/Scripts/python.exe -m mypy
        language: system
        pass_filenames: false
        types: [python]
