[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
]
ignore = [
    "E501",
]

[tool.ruff.lint.isort]
known-first-party = ["my_actor"]

[tool.mypy]
python_version = "3.12"
files = ["my_actor"]
strict = true
warn_unused_ignores = true
warn_return_any = true
ignore_missing_imports = true
disallow_subclassing_any = false

[tool.pytest.ini_options]
markers = [
    "live: live integration tests that require network access"
]
